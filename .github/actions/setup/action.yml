name: Set up Rust
inputs:
  toolchain:
    default: stable
  components:
    default: ""
runs:
  using: composite
  steps:
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Set up cache
      uses: Swatinem/rust-cache@v2
